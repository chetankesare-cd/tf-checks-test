---
name: 🌎 Terraform Checks

on:
  workflow_call:
    inputs:
      working_directory:
        required: false
        type: string
        default: './examples/complete/'
        description: 'Directory where terraform code exists. Default: ./examples/complete/'
      provider:
        required: false
        type: string
        default: ""
        description: 'Cloud provider to run the workflow. e.g. azurerm, aws, gcp, digitalocean, or none (skip cloud auth for validate-only)'
      aws_region:
        required: false
        type: string
        default: us-east-1
        description: 'AWS region of terraform deployment.'
      var_file:
        required: false
        default: ""
        type: string
        description: 'Terraform var file directory. e.g. vars/dev.tfvars'
      terraform_version:
        required: false
        type: string
        description: 'Terraform version to use. Leave empty to use latest or min/max versions.'
      role_duration_seconds:
        required: false
        type: number
        default: 3600
        description: 'The assumed role duration in seconds, if assuming a role. Defaults to 1 hour (3600 seconds). Acceptable values range from 15 minutes (900 seconds) to 12 hours (43200 seconds).'
      enable_plan:
        required: false
        type: boolean
        default: false
        description: 'Allow workflow to run terraform plan.'
      show_plan:
        required: false
        type: boolean
        default: false
        description: 'Controls Terraform plan output. When true, displays full plan details. When false, shows only a concise summary (e.g., Plan: X to add, Y to change, Z to destroy).'
      token_format:
        required: false
        type: string
        default: access_token
        description: 'Output format for the generated authentication token. For OAuth 2.0 access tokens, specify "access_token". For OIDC tokens, specify "id_token". To skip token generation, leave this value empty'
      access_token_lifetime:
        required: false
        type: string
        default: 300s
        description: 'Desired lifetime duration of the access token, in seconds'
      project_id:
        required: false
        type: string
        description: 'ID of the default project to use for future API calls and invocations.'
      create_credentials_file:
        required: false
        type: string
        default: true
        description: 'If true, the action will securely generate a credentials file which can be used for authentication via gcloud and Google Cloud SDKs.'

    secrets:
      AZURE_CREDENTIALS:
        required: false
        description: 'Azure Credentials to install Azure in github runner.'
      AWS_ACCESS_KEY_ID:
        required: false
        description: 'AWS Access Key ID to install AWS CLI.'
      AWS_SECRET_ACCESS_KEY:
        required: false
        description: 'AWS Secret access key to install AWS CLI'
      AWS_SESSION_TOKEN:
        required: false
        description: 'AWS Session Token to install AWS CLI'
      BUILD_ROLE:
        required: false
        description: 'AWS OIDC role for aws authentication.'
      DIGITALOCEAN_ACCESS_TOKEN:
        required: false
        description: 'Digitalocean access Token to install Digitalocean CLI'
      GITHUB:
        required: false
        description: 'PAT of the user to run the jobs.'
      TF_API_TOKEN:
        required: false
        description: 'Terraform cloud token if your backend is terraform cloud.'
      GCP_CREDENTIALS:
        required: false
        description: 'The Google Cloud JSON service account key to use for authentication'
      WORKLOAD_IDENTITY_PROVIDER:
        required: false
        description: 'The full identifier of the Workload Identity Provider'
      SERVICE_ACCOUNT:
        required: false
        description: 'The service account to be used'

jobs:

  terraform-checks:
    name: 🌎 Terraform Full Checks
    runs-on: ubuntu-latest
    env:
      TF_PLUGIN_CACHE_DIR: /tmp/terraform-plugin-cache

    strategy:
      fail-fast: false
      matrix:
        version: ["min", "max"]

    steps:
      # ── Two-step checkout so PR code is used for fmt/validate ──
      - name: 📦 Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref || github.ref }}
          fetch-depth: 1

      - name: 📦 Checkout PR code (into pr-code/)
        if: github.event.pull_request.head.sha != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-code
          persist-credentials: false
          fetch-depth: 1

      - name: 🔀 Apply PR terraform files (exclude .github/)
        if: github.event.pull_request.head.sha != ''
        run: |
          rsync -av --exclude='.github/' pr-code/ ./
          rm -rf pr-code

      - name: 📁 Create Terraform plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: 🧮 Get Terraform min/max versions
        id: minmax
        uses: clowdhaus/terraform-min-max@main

      - name: 🎯 Set Terraform version
        id: set-version
        run: |
          if [ "${{ matrix.version }}" = "min" ]; then
            echo "tf_version=${{ steps.minmax.outputs.minVersion }}" >> $GITHUB_OUTPUT
          else
            if [ -n "${{ inputs.terraform_version }}" ]; then
              echo "tf_version=${{ inputs.terraform_version }}" >> $GITHUB_OUTPUT
            else
              echo "tf_version=${{ steps.minmax.outputs.maxVersion }}" >> $GITHUB_OUTPUT
            fi
          fi

      - name: ♻️ Cache Terraform plugins
        uses: actions/cache@v5
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      # ── Plan gate: fork detection + safe-to-plan label check ──
      - name: 🔐 Plan gate check
        id: plan-gate
        if: inputs.enable_plan
        run: |
          IS_FORK="false"
          if [ -n "${{ github.event.pull_request.head.repo.full_name }}" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            IS_FORK="true"
          fi
          echo "is_fork=$IS_FORK" >> $GITHUB_OUTPUT

          if [ "$IS_FORK" = "true" ]; then
            echo "🔍 Fork PR detected — checking for 'safe-to-plan' label..."

            # github.event.number is more reliable than
            # github.event.pull_request.number in reusable workflow context
            PR_NUMBER="${{ github.event.number }}"
            echo "PR number: $PR_NUMBER"

            API_RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/labels")

            echo "API response: $API_RESPONSE"

            LABEL_FOUND=$(echo "$API_RESPONSE" | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    if not isinstance(data, list):
        print('false')
        sys.exit(0)
    names = [l['name'] for l in data]
    print('true' if 'safe-to-plan' in names else 'false')
except Exception as e:
    print('false')
")

            echo "label_found: $LABEL_FOUND"
            echo "plan_allowed=$LABEL_FOUND" >> $GITHUB_OUTPUT

            if [ "$LABEL_FOUND" = "true" ]; then
              echo "✅ Label 'safe-to-plan' found — plan will run."
            else
              echo "⛔ Label 'safe-to-plan' not found — plan will be skipped."
            fi
          else
            echo "✅ Internal PR — plan allowed directly."
            echo "plan_allowed=true" >> $GITHUB_OUTPUT
          fi

      # ── Cloud auth — only runs if plan is allowed ──
      - name: ☁️ Install AWS CLI
        if: inputs.provider == 'aws' && inputs.enable_plan && steps.plan-gate.outputs.plan_allowed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          role-to-assume: ${{ secrets.BUILD_ROLE }}
          aws-region: ${{ inputs.aws_region }}
          role-duration-seconds: ${{ inputs.role_duration_seconds }}
          role-skip-session-tagging: true

      - name: ☁️ Install Azure CLI
        if: inputs.provider == 'azurerm' && inputs.enable_plan && steps.plan-gate.outputs.plan_allowed == 'true'
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ☁️ Install DigitalOcean CLI
        if: inputs.provider == 'digitalocean' && inputs.enable_plan && steps.plan-gate.outputs.plan_allowed == 'true'
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: ☁️ Authenticate to Google Cloud
        if: inputs.provider == 'gcp' && inputs.enable_plan && steps.plan-gate.outputs.plan_allowed == 'true'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
          create_credentials_file: ${{ inputs.create_credentials_file }}
          token_format: ${{ inputs.token_format }}
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          access_token_lifetime: ${{ inputs.access_token_lifetime }}
          project_id: ${{ inputs.project_id }}

      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ steps.set-version.outputs.tf_version }}

      - name: 🧹 Terraform Format
        run: terraform fmt --recursive -check=true

      - name: 🏗️ Terraform Init & Terraform Validate
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init -input=false -no-color
          terraform validate -no-color

      # ── Terraform Plan — gated behind plan_allowed ──
      - name: 📋 Terraform Plan
        id: tf-plan
        if: inputs.enable_plan && steps.plan-gate.outputs.plan_allowed == 'true'
        working-directory: ${{ inputs.working_directory }}
        run: |
          export exitcode=0
          terraform version | head -n 1

          if [ -n "${{ inputs.var_file }}" ]; then
            terraform plan -detailed-exitcode -no-color -out=tfplan --var-file=${{ inputs.var_file }} > plan.txt 2>&1 || exitcode=$?
          else
            terraform plan -detailed-exitcode -no-color -out=tfplan > plan.txt 2>&1 || exitcode=$?
          fi

          if [ $exitcode -eq 1 ]; then
            echo "Terraform Plan Failed!"
            cat plan.txt
            exit 1
          fi

          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT

          if [ "${{ inputs.show_plan }}" == "true" ]; then
            cat plan.txt
          else
            grep -E '^Plan:|^No changes' plan.txt || echo "No changes."
          fi

      # ── Shown when fork PR has no safe-to-plan label ──
      - name: ℹ️ Plan skipped (fork — needs safe-to-plan label)
        if: inputs.enable_plan && steps.plan-gate.outputs.is_fork == 'true' && steps.plan-gate.outputs.plan_allowed == 'false'
        run: |
          echo "=========================================="
          echo "  ⚠️  Terraform Plan SKIPPED"
          echo "  This PR is from a fork."
          echo "  A maintainer must add label: safe-to-plan"
          echo "  to allow terraform plan to run."
          echo "=========================================="
